<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Salary System</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

</head>
<body>

<div class="container">

  <div class="header">
    <h1><i class="fa-solid fa-person-chalkboard"></i> Teacher Salary System</h1>
  </div>

  <div class="form-grid">

    <input type="text" id="teacherName" placeholder="Teacher Name">

    <input type="month" id="monthPicker">

    <input type="number" id="rate" placeholder="Rate Per Hour">

  </div>

  <div class="days-grid">

    <!-- Sunday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Sunday" class="dayCheck">
        <span class="checkmark"></span>
        Axad
      </label>

      <input type="number" id="SundayHours" placeholder="Hours">
    </div>

    <!-- Monday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Monday" class="dayCheck">
        <span class="checkmark"></span>
        Isniin
      </label>

      <input type="number" id="MondayHours" placeholder="Hours">
    </div>

    <!-- Tuesday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Tuesday" class="dayCheck">
        <span class="checkmark"></span>
        Talaado
      </label>

      <input type="number" id="TuesdayHours" placeholder="Hours">
    </div>

    <!-- Wednesday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Wednesday" class="dayCheck">
        <span class="checkmark"></span>
        Arbaco
      </label>

      <input type="number" id="WednesdayHours" placeholder="Hours">
    </div>

    <!-- Thursday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Thursday" class="dayCheck">
        <span class="checkmark"></span>
        Khamiis
      </label>

      <input type="number" id="ThursdayHours" placeholder="Hours">
    </div>

    <!-- Friday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Friday" class="dayCheck">
        <span class="checkmark"></span>
        Jimco
      </label>

      <input type="number" id="FridayHours" placeholder="Hours">
    </div>

    <!-- Saturday -->
    <div class="day-card">
      <label class="custom-checkbox">
        <input type="checkbox" value="Saturday" class="dayCheck">
        <span class="checkmark"></span>
        Sabti
      </label>

      <input type="number" id="SaturdayHours" placeholder="Hours">
    </div>

  </div>

  <button class="calculate-btn" onclick="calculateSalary()">
    Calculate Salary
  </button>

  <div id="result" class="result-box"></div>

  <div class="download-buttons">

    <button onclick="downloadPDF()">
      <i class="fa-solid fa-file-pdf"></i>
      Download PDF
    </button>

    <button onclick="downloadExcel()">
      <i class="fa-solid fa-file-excel"></i>
      Download Excel
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
